name: Autopost Chinese Character

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests google-genai

      - name: Run script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TG_CHANNEL_ID: ${{ secrets.TG_CHANNEL_ID }}
        run: python telegram_gemini_autopost.py